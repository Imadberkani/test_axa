experiment_name: test_axa
run_name: lightgbm
description: "first attempt with lightgbm"

model:
  type: lightgbm       # decision_tree | lightgbm | xgboost | catboost

# Un bloc par modèle. Le notebook ne lit que celui correspondant à `model.type`.
params:

  decision_tree:
    criterion: gini                # split quality criterion: gini | entropy | log_loss
    splitter: best                 # split strategy: best | random

    max_depth: 6                  # maximum tree depth (controls overfitting)
    min_samples_split: 20           # minimum number of samples required to split a node
    min_samples_leaf: 10            # minimum number of samples required in a leaf
    min_weight_fraction_leaf: 0.0  # minimum weighted fraction required in a leaf

    max_features: null             # maximum number of features considered at each split
    max_leaf_nodes: 32           # maximum number of leaf nodes (controls complexity)
    min_impurity_decrease: 0.0     # minimum impurity decrease required to split

    class_weight: balanced         # null | balanced (useful for imbalanced targets)
    ccp_alpha: 0.0                 # cost-complexity pruning parameter
    random_state: 42               # reproducibility

  lightgbm:
    n_estimators: 500         # nb d'arbres (+ early stopping en pratique)
    learning_rate: 0.01       # pas d'apprentissage
    num_leaves: 31            # complexité de chaque arbre (clé en LGBM)
    max_depth: -1             # -1 = illimité (num_leaves fait le contrôle)
    min_child_samples: 20     # obs min par feuille → anti-overfit
    subsample: 0.9            # bagging sur les lignes
    colsample_bytree: 0.9     # bagging sur les colonnes
    reg_alpha: 0.0            # L1
    reg_lambda: 0.0           # L2
    class_weight: balanced    # null | balanced
    random_state: 42
    n_jobs: -1
    objective: 'multiclass'

  xgboost:
    n_estimators: 500
    learning_rate: 0.01
    max_depth: 6              # profondeur — lever principal en XGB
    min_child_weight: 1       # somme min de hessians par feuille (régularisation)
    subsample: 0.9
    colsample_bytree: 0.9
    gamma: 0.0                # gain min requis pour splitter
    reg_alpha: 0.0            # L1
    reg_lambda: 1.0           # L2
    scale_pos_weight: 14      # ~ n_neg / n_pos  (ici ~93/7)
    eval_metric: auc
    random_state: 42
    n_jobs: -1
    tree_method: hist         # rapide sur CPU

  catboost:
    iterations: 500           # = n_estimators
    learning_rate: 0.01
    depth: 6                  # profondeur (1-16)
    l2_leaf_reg: 3.0          # L2 sur les feuilles
    border_count: 128         # quantization des features numériques
    auto_class_weights: Balanced   # gère le déséquilibre automatiquement
    random_seed: 42

early_stopping_rounds: 50

preprocessing:
  imputers:
    height:      {strategy: constant, fill_value: -999}
    # NumberOfDependents: {strategy: constant, fill_value: -1}

tops: [1, 2, 5]
